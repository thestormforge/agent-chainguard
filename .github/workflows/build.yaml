name: Build and publish Chainguard agent image

# Rebases the StormForge agent binary onto a Chainguard base and pushes the
# result to the container registry.
#
# Triggers:
#   - push to main         -> rebuild against the agent's `latest` tag
#   - workflow_dispatch     -> rebuild against a specific agent tag (input below)
#
# The agent's release workflow also calls this via workflow_dispatch, passing
# the released tag, so a new agent release produces a matching Chainguard image.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      agent_tag:
        description: "StormForge agent image tag to rebase (defaults to latest)"
        required: false
        default: latest

permissions:
  contents: read
  packages: write

env:
  # Must match the repository referenced in chainguard-values-v2-agent.yaml.
  IMAGE: ghcr.io/thestormforge/agent-chainguard/workload-agent

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve agent tag
        id: tag
        # On a manual dispatch, use the provided tag; on a main push, rebuild
        # against the agent's latest.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.agent_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/workload-agent
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AGENT_TAG=${{ steps.tag.outputs.value }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}
